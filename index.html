<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern Glassmorphism & Neon Animations */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            background: #020617; 
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bar-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 30px 10px 0 10px; /* Added top padding for labels */
            gap: 3px;
        }

        .bar {
            flex-grow: 1;
            border-radius: 4px 4px 0 0;
            transition: height 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            position: relative;
        }

        /* Permanently visible value labels at the top of the bars */
        .bar-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 10px;
            font-weight: 700;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 20;
        }

        @media (min-width: 768px) {
            .bar-label {
                font-size: 12px;
                top: -24px;
            }
        }

        /* Modern Neon State Colors */
        .bar-default { 
            background: linear-gradient(to top, #2563eb, #60a5fa); 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); 
        }
        .bar-compare { 
            background: linear-gradient(to top, #ca8a04, #fde047); 
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.6); 
        }
        .bar-swap { 
            background: linear-gradient(to top, #e11d48, #fb7185); 
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.6); 
        }
        .bar-sorted { 
            background: linear-gradient(to top, #059669, #34d399); 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); 
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #818cf8;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.6);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0a0f1d] to-black h-screen flex flex-col text-slate-200">

    <header class="glass-panel w-full p-4 z-10 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col gap-4">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent text-center md:text-left">
                    Algorithm Visualizer
                </h1>

                <div class="flex flex-wrap justify-center items-center gap-3 w-full md:w-auto">
                    <!-- Added all new algorithms to dropdown -->
                    <select id="algo-select" class="bg-slate-800/80 border border-slate-700 text-sm rounded-lg px-4 py-2 text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                        <option value="heap">Heap Sort</option>
                        <option value="counting">Counting Sort</option>
                        <option value="radix">Radix Sort</option>
                        <option value="shell">Shell Sort</option>
                        <option value="tim">Tim Sort</option>
                    </select>

                    <button id="btn-start" class="flex items-center gap-2 px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(79,70,229,0.4)] transition-all">
                        ▶ Start
                    </button>
                    <button id="btn-pause" class="hidden flex items-center gap-2 px-5 py-2 bg-yellow-600 hover:bg-yellow-500 text-white rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(202,138,4,0.4)] transition-all">
                        ⏸ Pause
                    </button>
                    <button id="btn-stop" class="hidden flex items-center gap-2 px-5 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-sm font-bold shadow-[0_0_15px_rgba(225,29,72,0.4)] transition-all">
                        ⏹ Stop
                    </button>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row justify-between items-center gap-4 border-t border-slate-700/50 pt-4">
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                    <div class="flex w-full sm:w-auto">
                        <input type="text" id="custom-input" placeholder="Custom array (e.g. 50, 10, 80)" class="w-full sm:w-56 bg-slate-900 border border-slate-700 rounded-l-lg px-3 py-2 text-sm text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none placeholder-slate-500">
                        <button id="btn-set-data" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-r-lg text-sm font-medium transition-colors border border-l-0 border-slate-700 whitespace-nowrap">
                            Set Data
                        </button>
                    </div>
                    <button id="btn-generate" class="w-full sm:w-auto px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg text-sm font-medium transition-colors border border-slate-700 whitespace-nowrap">
                        🔀 Random Array
                    </button>
                </div>

                <div class="flex items-center gap-3 w-full lg:w-64 bg-slate-800/50 px-4 py-2 rounded-lg border border-slate-700/50">
                    <span class="text-xs text-slate-400 font-medium">Speed:</span>
                    <input type="range" id="speed-slider" min="1" max="100" value="80" class="flex-1">
                </div>
            </div>

        </div>
    </header>

    <main class="flex-1 relative w-full pt-12 pb-6 overflow-hidden">
        <div class="absolute top-4 left-4 md:left-8 flex flex-wrap gap-4 text-[11px] font-bold tracking-wider uppercase text-slate-400 z-0">
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-yellow-400 shadow-[0_0_8px_rgba(234,179,8,0.5)]"></div> Comparing</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-rose-500 shadow-[0_0_8px_rgba(225,29,72,0.5)]"></div> Swapping</div>
            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> Sorted</div>
        </div>

        <div id="bar-container" class="bar-container relative z-10"></div>
    </main>

    <script>
        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let array = [];
        let isSorting = false;
        let isPaused = false;
        let numBars = window.innerWidth < 768 ? 20 : 50;
        
        const container = document.getElementById('bar-container');
        const btnGenerate = document.getElementById('btn-generate');
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnStop = document.getElementById('btn-stop');
        const btnSetData = document.getElementById('btn-set-data');
        const inputCustom = document.getElementById('custom-input');
        const selectAlgo = document.getElementById('algo-select');
        const sliderSpeed = document.getElementById('speed-slider');

        // ==========================================
        // UI & UTILITY FUNCTIONS
        // ==========================================
        function updateUIState() {
            if (isSorting) {
                btnStart.classList.add('hidden');
                btnPause.classList.remove('hidden');
                btnStop.classList.remove('hidden');
                btnPause.innerHTML = isPaused ? '▶ Resume' : '⏸ Pause';
                [selectAlgo, btnGenerate, btnSetData, inputCustom].forEach(el => {
                    el.disabled = true;
                    el.classList.add('opacity-50', 'cursor-not-allowed');
                });
            } else {
                btnStart.classList.remove('hidden');
                btnPause.classList.add('hidden');
                btnStop.classList.add('hidden');
                [selectAlgo, btnGenerate, btnSetData, inputCustom].forEach(el => {
                    el.disabled = false;
                    el.classList.remove('opacity-50', 'cursor-not-allowed');
                });
            }
        }

        const getDelay = () => {
            const speed = parseInt(sliderSpeed.value);
            return Math.pow(100 - speed, 1.4) + 5; 
        };

        const sleep = async (ms) => {
            let elapsed = 0;
            const checkInterval = 20;
            while (elapsed < ms || isPaused) {
                if (!isSorting) throw new Error("SORTING_STOPPED"); 
                await new Promise(resolve => setTimeout(resolve, checkInterval));
                if (!isPaused) elapsed += checkInterval;
            }
            if (!isSorting) throw new Error("SORTING_STOPPED");
        };

        // UI helper to update a bar's height, label, and color
        function updateBar(idx, val, maxVal, stateClass = null) {
            const bars = document.getElementsByClassName('bar');
            bars[idx].style.height = `${Math.max((val / maxVal) * 95, 5)}%`;
            bars[idx].querySelector('.bar-label').innerText = val;
            if (stateClass) bars[idx].className = `bar ${stateClass}`;
        }

        function renderArray() {
            container.innerHTML = ''; 
            const maxVal = Math.max(...array, 1); 

            for (let i = 0; i < array.length; i++) {
                const val = array[i];
                const heightPct = Math.max((val / maxVal) * 95, 5); 

                const bar = document.createElement('div');
                bar.classList.add('bar', 'bar-default');
                bar.style.height = `${heightPct}%`;

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.innerText = val;
                bar.appendChild(label);

                container.appendChild(bar);
            }
        }

        function generateArray() {
            stopSorting();
            array = [];
            for (let i = 0; i < numBars; i++) {
                array.push(Math.floor(Math.random() * 95) + 5);
            }
            renderArray();
        }

        function handleCustomInput() {
            const val = inputCustom.value;
            if (!val) return;
            const parsed = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0);
            if (parsed.length === 0) {
                alert("Please enter valid numbers separated by commas (e.g. 10, 50, 20)");
                return;
            }
            stopSorting();
            array = parsed;
            numBars = array.length;
            renderArray();
            inputCustom.value = ''; 
        }

        function stopSorting() {
            isSorting = false;
            isPaused = false;
            updateUIState();
        }

        async function markAllSorted() {
            const bars = document.getElementsByClassName('bar');
            for (let i = 0; i < bars.length; i++) {
                if (!isSorting) return;
                bars[i].className = 'bar bar-sorted';
                await sleep(15); 
            }
        }

        // ==========================================
        // SORTING ALGORITHMS
        // ==========================================
        async function bubbleSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    bars[j].className = 'bar bar-compare';
                    bars[j + 1].className = 'bar bar-compare';
                    await sleep(getDelay());

                    if (array[j] > array[j + 1]) {
                        bars[j].className = 'bar bar-swap';
                        bars[j + 1].className = 'bar bar-swap';
                        await sleep(getDelay());

                        let temp = array[j];
                        array[j] = array[j + 1];
                        array[j + 1] = temp;

                        updateBar(j, array[j], maxVal);
                        updateBar(j + 1, array[j + 1], maxVal);
                        swapped = true;
                    }
                    bars[j].className = 'bar bar-default';
                    bars[j + 1].className = 'bar bar-default';
                }
                bars[n - 1 - i].className = 'bar bar-sorted';
                if (!swapped) break;
            }
        }

        async function selectionSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 0; i < n; i++) {
                let minIdx = i;
                bars[minIdx].className = 'bar bar-swap'; 
                for (let j = i + 1; j < n; j++) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (array[j] < array[minIdx]) {
                        if (minIdx !== i) bars[minIdx].className = 'bar bar-default';
                        minIdx = j;
                        bars[minIdx].className = 'bar bar-swap'; 
                    } else {
                        bars[j].className = 'bar bar-default';
                    }
                }
                if (minIdx !== i) {
                    await sleep(getDelay());
                    let temp = array[i];
                    array[i] = array[minIdx];
                    array[minIdx] = temp;
                    updateBar(i, array[i], maxVal);
                    updateBar(minIdx, array[minIdx], maxVal);
                }
                bars[minIdx].className = 'bar bar-default';
                bars[i].className = 'bar bar-sorted'; 
            }
        }

        async function insertionSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 1; i < n; i++) {
                let key = array[i];
                let j = i - 1;
                bars[i].className = 'bar bar-compare';
                await sleep(getDelay());
                
                while (j >= 0 && array[j] > key) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());
                    
                    array[j + 1] = array[j];
                    updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                    bars[j].className = 'bar bar-default';
                    j = j - 1;
                }
                array[j + 1] = key;
                updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                await sleep(getDelay());
                bars[j + 1].className = 'bar bar-default';
            }
        }

        async function mergeSort() {
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            async function merge(l, m, r) {
                let n1 = m - l + 1, n2 = r - m;
                let L = new Array(n1), R = new Array(n2);

                for (let i = 0; i < n1; i++) L[i] = array[l + i];
                for (let j = 0; j < n2; j++) R[j] = array[m + 1 + j];

                let i = 0, j = 0, k = l;
                while (i < n1 && j < n2) {
                    bars[k].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (L[i] <= R[j]) {
                        array[k] = L[i];
                        i++;
                    } else {
                        array[k] = R[j];
                        j++;
                    }
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++;
                }

                while (i < n1) {
                    array[k] = L[i];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    i++; k++;
                }

                while (j < n2) {
                    array[k] = R[j];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    j++; k++;
                }
            }

            async function mergeSortHelper(l, r) {
                if (l >= r || !isSorting) return;
                let m = l + Math.floor((r - l) / 2);
                await mergeSortHelper(l, m);
                await mergeSortHelper(m + 1, r);
                await merge(l, m, r);
            }
            await mergeSortHelper(0, array.length - 1);
        }

        async function quickSort() {
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            async function partition(low, high) {
                let pivot = array[high];
                bars[high].className = 'bar bar-compare'; // highlight pivot
                let i = low - 1;

                for (let j = low; j < high; j++) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());

                    if (array[j] < pivot) {
                        i++;
                        let temp = array[i];
                        array[i] = array[j];
                        array[j] = temp;
                        
                        updateBar(i, array[i], maxVal, 'bar-swap');
                        updateBar(j, array[j], maxVal, 'bar-swap');
                        await sleep(getDelay());
                        bars[i].className = 'bar bar-default';
                    }
                    bars[j].className = 'bar bar-default';
                }
                
                let temp = array[i + 1];
                array[i + 1] = array[high];
                array[high] = temp;
                
                updateBar(i + 1, array[i + 1], maxVal, 'bar-swap');
                updateBar(high, array[high], maxVal, 'bar-default');
                await sleep(getDelay());
                bars[i + 1].className = 'bar bar-default';
                return i + 1;
            }

            async function quickSortHelper(low, high) {
                if (low < high) {
                    if (!isSorting) return;
                    let pi = await partition(low, high);
                    await quickSortHelper(low, pi - 1);
                    await quickSortHelper(pi + 1, high);
                }
            }
            await quickSortHelper(0, array.length - 1);
        }

        async function heapSort() {
            const maxVal = Math.max(...array);
            const n = array.length;
            const bars = document.getElementsByClassName('bar');

            async function heapify(n, i) {
                let largest = i;
                let l = 2 * i + 1;
                let r = 2 * i + 2;

                if (l < n && array[l] > array[largest]) largest = l;
                if (r < n && array[r] > array[largest]) largest = r;

                if (largest !== i) {
                    bars[i].className = 'bar bar-compare';
                    bars[largest].className = 'bar bar-compare';
                    await sleep(getDelay());

                    let swap = array[i];
                    array[i] = array[largest];
                    array[largest] = swap;

                    updateBar(i, array[i], maxVal, 'bar-swap');
                    updateBar(largest, array[largest], maxVal, 'bar-swap');
                    await sleep(getDelay());

                    bars[i].className = 'bar bar-default';
                    bars[largest].className = 'bar bar-default';

                    await heapify(n, largest);
                }
            }

            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                if (!isSorting) return;
                await heapify(n, i);
            }

            for (let i = n - 1; i > 0; i--) {
                if (!isSorting) return;
                bars[0].className = 'bar bar-swap';
                bars[i].className = 'bar bar-swap';
                await sleep(getDelay());

                let temp = array[0];
                array[0] = array[i];
                array[i] = temp;

                updateBar(0, array[0], maxVal);
                updateBar(i, array[i], maxVal, 'bar-sorted');
                bars[0].className = 'bar bar-default';

                await heapify(i, 0);
            }
            if (isSorting) bars[0].className = 'bar bar-sorted';
        }

        async function countingSort() {
            let max = Math.max(...array);
            let count = new Array(max + 1).fill(0);
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            // Tally counts visually
            for(let i=0; i<array.length; i++) {
                if(!isSorting) return;
                bars[i].className = 'bar bar-compare';
                await sleep(getDelay());
                count[array[i]]++;
                bars[i].className = 'bar bar-default';
            }

            // Write back to array visually
            let arrIdx = 0;
            for(let i=0; i<=max; i++) {
                while(count[i] > 0) {
                    if(!isSorting) return;
                    bars[arrIdx].className = 'bar bar-swap';
                    await sleep(getDelay());
                    array[arrIdx] = i;
                    updateBar(arrIdx, array[arrIdx], maxVal);
                    await sleep(getDelay());
                    bars[arrIdx].className = 'bar bar-default';
                    arrIdx++;
                    count[i]--;
                }
            }
        }

        async function radixSort() {
            const maxVal = Math.max(...array);
            const bars = document.getElementsByClassName('bar');

            async function countSortRadix(exp) {
                let output = new Array(array.length);
                let count = new Array(10).fill(0);

                for (let i = 0; i < array.length; i++) {
                    if (!isSorting) return;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());
                    count[Math.floor(array[i] / exp) % 10]++;
                    bars[i].className = 'bar bar-default';
                }

                for (let i = 1; i < 10; i++) count[i] += count[i - 1];

                for (let i = array.length - 1; i >= 0; i--) {
                    let digit = Math.floor(array[i] / exp) % 10;
                    output[count[digit] - 1] = array[i];
                    count[digit]--;
                }

                for (let i = 0; i < array.length; i++) {
                    if (!isSorting) return;
                    bars[i].className = 'bar bar-swap';
                    await sleep(getDelay());
                    array[i] = output[i];
                    updateBar(i, array[i], maxVal);
                    bars[i].className = 'bar bar-default';
                }
            }

            let max = Math.max(...array);
            for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
                if (!isSorting) break;
                await countSortRadix(exp);
            }
        }

        async function shellSort() {
            let n = array.length;
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            for (let gap = Math.floor(n / 2); gap > 0; gap = Math.floor(gap / 2)) {
                for (let i = gap; i < n; i++) {
                    if (!isSorting) return;
                    let temp = array[i];
                    let j;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());

                    for (j = i; j >= gap && array[j - gap] > temp; j -= gap) {
                        bars[j - gap].className = 'bar bar-compare';
                        await sleep(getDelay());
                        
                        array[j] = array[j - gap];
                        updateBar(j, array[j], maxVal, 'bar-swap');
                        await sleep(getDelay());
                        
                        bars[j].className = 'bar bar-default';
                        bars[j - gap].className = 'bar bar-default';
                    }
                    array[j] = temp;
                    updateBar(j, array[j], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[j].className = 'bar bar-default';
                }
            }
        }

        async function timSort() {
            const RUN = 8;
            const n = array.length;
            const maxVal = Math.max(...array);
            const bars = document.getElementsByClassName('bar');

            async function insertSortTim(left, right) {
                for (let i = left + 1; i <= right; i++) {
                    let temp = array[i];
                    let j = i - 1;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());
                    while (j >= left && array[j] > temp) {
                        bars[j].className = 'bar bar-compare';
                        await sleep(getDelay());
                        array[j + 1] = array[j];
                        updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                        bars[j].className = 'bar bar-default';
                        j--;
                    }
                    array[j + 1] = temp;
                    updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[j + 1].className = 'bar bar-default';
                }
            }

            async function mergeTim(l, m, r) {
                let len1 = m - l + 1, len2 = r - m;
                let left = new Array(len1), right = new Array(len2);
                for (let x = 0; x < len1; x++) left[x] = array[l + x];
                for (let x = 0; x < len2; x++) right[x] = array[m + 1 + x];

                let i = 0, j = 0, k = l;
                while (i < len1 && j < len2) {
                    if (!isSorting) return;
                    bars[k].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (left[i] <= right[j]) {
                        array[k] = left[i];
                        i++;
                    } else {
                        array[k] = right[j];
                        j++;
                    }
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++;
                }
                while (i < len1) {
                    if (!isSorting) return;
                    array[k] = left[i];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++; i++;
                }
                while (j < len2) {
                    if (!isSorting) return;
                    array[k] = right[j];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++; j++;
                }
            }

            for (let i = 0; i < n; i += RUN) {
                if (!isSorting) return;
                await insertSortTim(i, Math.min(i + RUN - 1, n - 1));
            }

            for (let size = RUN; size < n; size = 2 * size) {
                for (let left = 0; left < n; left += 2 * size) {
                    if (!isSorting) return;
                    let mid = left + size - 1;
                    let right = Math.min(left + 2 * size - 1, n - 1);
                    if (mid < right) await mergeTim(left, mid, right);
                }
            }
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        btnGenerate.addEventListener('click', generateArray);
        btnSetData.addEventListener('click', handleCustomInput);
        
        inputCustom.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCustomInput();
        });

        window.addEventListener('resize', () => {
            const newBars = window.innerWidth < 768 ? 20 : 50;
            if (numBars !== newBars && !isSorting) {
                numBars = newBars;
                generateArray();
            }
        });

        btnStart.addEventListener('click', async () => {
            if (isSorting) return;
            isSorting = true;
            isPaused = false;
            updateUIState();
            renderArray(); 

            try {
                const algo = selectAlgo.value;
                switch(algo) {
                    case 'bubble': await bubbleSort(); break;
                    case 'selection': await selectionSort(); break;
                    case 'insertion': await insertionSort(); break;
                    case 'merge': await mergeSort(); break;
                    case 'quick': await quickSort(); break;
                    case 'heap': await heapSort(); break;
                    case 'counting': await countingSort(); break;
                    case 'radix': await radixSort(); break;
                    case 'shell': await shellSort(); break;
                    case 'tim': await timSort(); break;
                }
                
                if (isSorting) await markAllSorted();
            } catch (error) {
                if (error.message !== "SORTING_STOPPED") console.error(error);
            } finally {
                stopSorting();
            }
        });

        btnPause.addEventListener('click', () => {
            isPaused = !isPaused;
            updateUIState();
        });

        btnStop.addEventListener('click', () => {
            stopSorting();
            renderArray(); 
        });

        window.onload = generateArray;
    </script>
</body>
</html>
