<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A fully responsive and modern Algorithm Visualizer built with JavaScript.">
    <title>Algorithm Visualizer | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern Glassmorphism & Neon Animations */
        :root {
            --app-bg: #020617;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: var(--app-bg);
            /* Smooth background gradient */
            background-image: radial-gradient(ellipse at top, #0f172a, var(--app-bg), #000000);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #e2e8f0;
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2); 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            z-index: 50;
            position: relative;
        }

        /* Flex container for bars */
        .bar-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 40px 2vw 0 2vw; /* Use viewport units for padding */
            gap: max(1px, 0.3vw); /* Adaptive gap */
        }

        .bar {
            flex-grow: 1;
            border-radius: 4px 4px 0 0;
            transition: height 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            min-width: 2px; /* Prevent bars from squishing too much */
        }

        /* Responsive value labels */
        .bar-label {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.95);
            font-size: clamp(8px, 1vw, 12px); /* Fluid typography */
            font-weight: 700;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 20;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        /* Hide labels if there are too many bars (handled dynamically in JS via class) */
        .hide-labels .bar-label {
            opacity: 0;
            display: none;
        }

        /* Modern Neon State Colors */
        .bar-default { 
            background: linear-gradient(to top, #3b82f6, #60a5fa); 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); 
        }
        .bar-compare { 
            background: linear-gradient(to top, #eab308, #fde047); 
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.7); 
        }
        .bar-swap { 
            background: linear-gradient(to top, #ef4444, #fca5a5); 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.7); 
        }
        .bar-sorted { 
            background: linear-gradient(to top, #10b981, #34d399); 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); 
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #818cf8;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 12px rgba(129, 140, 248, 0.8);
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
        
        /* Focus styles for inputs */
        input[type=text]:focus, select:focus {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5);
            border-color: #6366f1;
        }
    </style>
</head>
<body>

    <!-- Header & Controls -->
    <header class="glass-panel w-full p-4 md:p-6 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex flex-col gap-5">
            
            <!-- Top row: Title and Primary Actions -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl md:text-3xl font-black bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent text-center md:text-left tracking-tight">
                    Algorithm Visualizer <span class="text-xs align-top text-indigo-400 font-semibold tracking-normal uppercase ml-1 opacity-80">Pro</span>
                </h1>

                <!-- Algorithm Selection and Play Controls -->
                <div class="flex flex-wrap justify-center items-center gap-2 md:gap-4 w-full md:w-auto">
                    
                    <div class="relative w-full sm:w-auto">
                        <select id="algo-select" class="w-full sm:w-48 appearance-none bg-slate-800/80 border border-slate-700/80 rounded-xl px-4 py-2.5 text-slate-200 text-sm font-medium focus:outline-none transition-colors cursor-pointer shadow-inner">
                            <option value="bubble">Bubble Sort</option>
                            <option value="selection">Selection Sort</option>
                            <option value="insertion">Insertion Sort</option>
                            <option value="merge">Merge Sort</option>
                            <option value="quick">Quick Sort</option>
                            <option value="heap">Heap Sort</option>
                            <option value="counting">Counting Sort</option>
                            <option value="radix">Radix Sort</option>
                            <option value="shell">Shell Sort</option>
                            <option value="tim">Tim Sort</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <div class="flex gap-2 w-full sm:w-auto mt-2 sm:mt-0">
                        <button id="btn-start" class="flex-1 sm:flex-none flex justify-center items-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                            Start
                        </button>
                        <button id="btn-pause" class="hidden flex-1 sm:flex-none flex justify-center items-center gap-2 px-6 py-2.5 bg-yellow-600 hover:bg-yellow-500 active:scale-95 text-white rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(202,138,4,0.5)] transition-all">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path></svg>
                            Pause
                        </button>
                        <button id="btn-stop" class="hidden flex-1 sm:flex-none flex justify-center items-center gap-2 px-6 py-2.5 bg-rose-600 hover:bg-rose-500 active:scale-95 text-white rounded-xl text-sm font-bold shadow-[0_0_15px_rgba(225,29,72,0.5)] transition-all">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5zm3 2a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H6z" clip-rule="evenodd"></path></svg>
                            Stop
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bottom row: Array generation and settings -->
            <div class="flex flex-col lg:flex-row justify-between items-stretch lg:items-center gap-4 border-t border-slate-700/50 pt-4">
                
                <div class="flex flex-col sm:flex-row items-stretch gap-3 w-full lg:w-auto">
                    <div class="flex flex-1 sm:flex-none">
                        <input type="text" id="custom-input" placeholder="Custom array (e.g. 50, 10, 80)" class="w-full sm:w-64 bg-slate-900/80 border border-slate-700/80 rounded-l-xl px-4 py-2 text-sm text-slate-200 focus:outline-none placeholder-slate-500 shadow-inner">
                        <button id="btn-set-data" class="px-4 py-2 bg-slate-700/80 hover:bg-slate-600 active:bg-slate-500 text-slate-200 rounded-r-xl text-sm font-medium transition-colors border border-l-0 border-slate-700/80 whitespace-nowrap">
                            Set
                        </button>
                    </div>
                    <button id="btn-generate" class="flex-1 sm:flex-none flex justify-center items-center gap-2 px-4 py-2 bg-slate-800/80 hover:bg-slate-700/80 active:scale-95 text-slate-200 rounded-xl text-sm font-medium transition-all border border-slate-700/80 shadow-sm whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Random Array
                    </button>
                </div>

                <div class="flex items-center gap-4 w-full lg:w-72 bg-slate-800/40 px-5 py-2.5 rounded-xl border border-slate-700/50 backdrop-blur-sm">
                    <span class="text-xs text-slate-300 font-semibold tracking-wide uppercase">Speed</span>
                    <input type="range" id="speed-slider" min="1" max="100" value="80" class="flex-1">
                </div>
            </div>

        </div>
    </header>

    <!-- Visualizer Workspace -->
    <main class="flex-1 relative w-full pt-8 pb-10 px-4 md:px-8 overflow-hidden">
        
        <!-- Legend / State Indicators -->
        <div class="absolute top-4 left-4 md:left-8 flex flex-wrap gap-3 md:gap-6 text-[10px] md:text-xs font-bold tracking-widest uppercase text-slate-400/80 z-0">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div> 
                <span>Unsorted</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(234,179,8,0.5)]"></div> 
                <span>Comparing</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div> 
                <span>Swapping</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> 
                <span>Sorted</span>
            </div>
        </div>

        <!-- Bars Container -->
        <div id="bar-container" class="bar-container relative z-10 w-full h-full mx-auto max-w-7xl"></div>
    </main>

    <script>
        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let array = [];
        let isSorting = false;
        let isPaused = false;
        
        // Responsive bar count
        function getResponsiveBarCount() {
            const width = window.innerWidth;
            if (width < 425) return 15;
            if (width < 768) return 25;
            if (width < 1024) return 40;
            return 50;
        }

        let numBars = getResponsiveBarCount();
        
        const container = document.getElementById('bar-container');
        const btnGenerate = document.getElementById('btn-generate');
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnStop = document.getElementById('btn-stop');
        const btnSetData = document.getElementById('btn-set-data');
        const inputCustom = document.getElementById('custom-input');
        const selectAlgo = document.getElementById('algo-select');
        const sliderSpeed = document.getElementById('speed-slider');

        // ==========================================
        // UI & UTILITY FUNCTIONS
        // ==========================================
        function updateUIState() {
            if (isSorting) {
                btnStart.classList.add('hidden');
                btnPause.classList.remove('hidden');
                btnStop.classList.remove('hidden');
                btnPause.innerHTML = isPaused ? 
                    '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg> Resume' : 
                    '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4h3v12H5V4zm7 0h3v12h-3V4z"></path></svg> Pause';
                
                [selectAlgo, btnGenerate, btnSetData, inputCustom].forEach(el => {
                    el.disabled = true;
                    el.classList.add('opacity-40', 'cursor-not-allowed', 'pointer-events-none');
                });
            } else {
                btnStart.classList.remove('hidden');
                btnPause.classList.add('hidden');
                btnStop.classList.add('hidden');
                [selectAlgo, btnGenerate, btnSetData, inputCustom].forEach(el => {
                    el.disabled = false;
                    el.classList.remove('opacity-40', 'cursor-not-allowed', 'pointer-events-none');
                });
            }
        }

        const getDelay = () => {
            const speed = parseInt(sliderSpeed.value);
            return Math.pow(100 - speed, 1.4) + 5; 
        };

        const sleep = async (ms) => {
            let elapsed = 0;
            const checkInterval = 20;
            while (elapsed < ms || isPaused) {
                if (!isSorting) throw new Error("SORTING_STOPPED"); 
                await new Promise(resolve => setTimeout(resolve, checkInterval));
                if (!isPaused) elapsed += checkInterval;
            }
            if (!isSorting) throw new Error("SORTING_STOPPED");
        };

        // UI helper to update a bar's height, label, and color
        function updateBar(idx, val, maxVal, stateClass = null) {
            const bars = document.getElementsByClassName('bar');
            if (!bars[idx]) return;
            bars[idx].style.height = `${Math.max((val / maxVal) * 95, 5)}%`;
            bars[idx].querySelector('.bar-label').innerText = val;
            if (stateClass) bars[idx].className = `bar ${stateClass}`;
        }

        function renderArray() {
            container.innerHTML = ''; 
            const maxVal = Math.max(...array, 1); 

            // Decide whether to hide labels based on bar count and screen width
            if (array.length > 30 && window.innerWidth < 768 || array.length > 60) {
                container.classList.add('hide-labels');
            } else {
                container.classList.remove('hide-labels');
            }

            for (let i = 0; i < array.length; i++) {
                const val = array[i];
                const heightPct = Math.max((val / maxVal) * 95, 5); 

                const bar = document.createElement('div');
                bar.classList.add('bar', 'bar-default');
                bar.style.height = `${heightPct}%`;

                const label = document.createElement('div');
                label.className = 'bar-label';
                label.innerText = val;
                bar.appendChild(label);

                container.appendChild(bar);
            }
        }

        function generateArray() {
            stopSorting();
            array = [];
            for (let i = 0; i < numBars; i++) {
                array.push(Math.floor(Math.random() * 95) + 5);
            }
            renderArray();
        }

        function handleCustomInput() {
            const val = inputCustom.value;
            if (!val) return;
            const parsed = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0);
            if (parsed.length === 0) {
                alert("Please enter valid numbers separated by commas (e.g. 10, 50, 20)");
                return;
            }
            stopSorting();
            array = parsed;
            numBars = array.length;
            renderArray();
            inputCustom.value = ''; 
        }

        function stopSorting() {
            isSorting = false;
            isPaused = false;
            updateUIState();
        }

        async function markAllSorted() {
            const bars = document.getElementsByClassName('bar');
            for (let i = 0; i < bars.length; i++) {
                if (!isSorting) return;
                bars[i].className = 'bar bar-sorted';
                await sleep(10); // Quicker finish animation
            }
        }

        // ==========================================
        // SORTING ALGORITHMS
        // ==========================================
        async function bubbleSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 0; i < n - 1; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    bars[j].className = 'bar bar-compare';
                    bars[j + 1].className = 'bar bar-compare';
                    await sleep(getDelay());

                    if (array[j] > array[j + 1]) {
                        bars[j].className = 'bar bar-swap';
                        bars[j + 1].className = 'bar bar-swap';
                        await sleep(getDelay());

                        let temp = array[j];
                        array[j] = array[j + 1];
                        array[j + 1] = temp;

                        updateBar(j, array[j], maxVal);
                        updateBar(j + 1, array[j + 1], maxVal);
                        swapped = true;
                    }
                    bars[j].className = 'bar bar-default';
                    bars[j + 1].className = 'bar bar-default';
                }
                bars[n - 1 - i].className = 'bar bar-sorted';
                if (!swapped) break;
            }
        }

        async function selectionSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 0; i < n; i++) {
                let minIdx = i;
                bars[minIdx].className = 'bar bar-swap'; 
                for (let j = i + 1; j < n; j++) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (array[j] < array[minIdx]) {
                        if (minIdx !== i) bars[minIdx].className = 'bar bar-default';
                        minIdx = j;
                        bars[minIdx].className = 'bar bar-swap'; 
                    } else {
                        bars[j].className = 'bar bar-default';
                    }
                }
                if (minIdx !== i) {
                    await sleep(getDelay());
                    let temp = array[i];
                    array[i] = array[minIdx];
                    array[minIdx] = temp;
                    updateBar(i, array[i], maxVal);
                    updateBar(minIdx, array[minIdx], maxVal);
                }
                bars[minIdx].className = 'bar bar-default';
                bars[i].className = 'bar bar-sorted'; 
            }
        }

        async function insertionSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;
            const maxVal = Math.max(...array);

            for (let i = 1; i < n; i++) {
                let key = array[i];
                let j = i - 1;
                bars[i].className = 'bar bar-compare';
                await sleep(getDelay());
                
                while (j >= 0 && array[j] > key) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());
                    
                    array[j + 1] = array[j];
                    updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                    bars[j].className = 'bar bar-default';
                    j = j - 1;
                }
                array[j + 1] = key;
                updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                await sleep(getDelay());
                bars[j + 1].className = 'bar bar-default';
            }
        }

        async function mergeSort() {
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            async function merge(l, m, r) {
                let n1 = m - l + 1, n2 = r - m;
                let L = new Array(n1), R = new Array(n2);

                for (let i = 0; i < n1; i++) L[i] = array[l + i];
                for (let j = 0; j < n2; j++) R[j] = array[m + 1 + j];

                let i = 0, j = 0, k = l;
                while (i < n1 && j < n2) {
                    bars[k].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (L[i] <= R[j]) {
                        array[k] = L[i];
                        i++;
                    } else {
                        array[k] = R[j];
                        j++;
                    }
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++;
                }

                while (i < n1) {
                    array[k] = L[i];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    i++; k++;
                }

                while (j < n2) {
                    array[k] = R[j];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    j++; k++;
                }
            }

            async function mergeSortHelper(l, r) {
                if (l >= r || !isSorting) return;
                let m = l + Math.floor((r - l) / 2);
                await mergeSortHelper(l, m);
                await mergeSortHelper(m + 1, r);
                await merge(l, m, r);
            }
            await mergeSortHelper(0, array.length - 1);
        }

        async function quickSort() {
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            async function partition(low, high) {
                let pivot = array[high];
                bars[high].className = 'bar bar-compare'; // highlight pivot
                let i = low - 1;

                for (let j = low; j < high; j++) {
                    bars[j].className = 'bar bar-compare';
                    await sleep(getDelay());

                    if (array[j] < pivot) {
                        i++;
                        let temp = array[i];
                        array[i] = array[j];
                        array[j] = temp;
                        
                        updateBar(i, array[i], maxVal, 'bar-swap');
                        updateBar(j, array[j], maxVal, 'bar-swap');
                        await sleep(getDelay());
                        bars[i].className = 'bar bar-default';
                    }
                    bars[j].className = 'bar bar-default';
                }
                
                let temp = array[i + 1];
                array[i + 1] = array[high];
                array[high] = temp;
                
                updateBar(i + 1, array[i + 1], maxVal, 'bar-swap');
                updateBar(high, array[high], maxVal, 'bar-default');
                await sleep(getDelay());
                bars[i + 1].className = 'bar bar-default';
                return i + 1;
            }

            async function quickSortHelper(low, high) {
                if (low < high) {
                    if (!isSorting) return;
                    let pi = await partition(low, high);
                    await quickSortHelper(low, pi - 1);
                    await quickSortHelper(pi + 1, high);
                }
            }
            await quickSortHelper(0, array.length - 1);
        }

        async function heapSort() {
            const maxVal = Math.max(...array);
            const n = array.length;
            const bars = document.getElementsByClassName('bar');

            async function heapify(n, i) {
                let largest = i;
                let l = 2 * i + 1;
                let r = 2 * i + 2;

                if (l < n && array[l] > array[largest]) largest = l;
                if (r < n && array[r] > array[largest]) largest = r;

                if (largest !== i) {
                    bars[i].className = 'bar bar-compare';
                    bars[largest].className = 'bar bar-compare';
                    await sleep(getDelay());

                    let swap = array[i];
                    array[i] = array[largest];
                    array[largest] = swap;

                    updateBar(i, array[i], maxVal, 'bar-swap');
                    updateBar(largest, array[largest], maxVal, 'bar-swap');
                    await sleep(getDelay());

                    bars[i].className = 'bar bar-default';
                    bars[largest].className = 'bar bar-default';

                    await heapify(n, largest);
                }
            }

            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                if (!isSorting) return;
                await heapify(n, i);
            }

            for (let i = n - 1; i > 0; i--) {
                if (!isSorting) return;
                bars[0].className = 'bar bar-swap';
                bars[i].className = 'bar bar-swap';
                await sleep(getDelay());

                let temp = array[0];
                array[0] = array[i];
                array[i] = temp;

                updateBar(0, array[0], maxVal);
                updateBar(i, array[i], maxVal, 'bar-sorted');
                bars[0].className = 'bar bar-default';

                await heapify(i, 0);
            }
            if (isSorting) bars[0].className = 'bar bar-sorted';
        }

        async function countingSort() {
            let max = Math.max(...array);
            let count = new Array(max + 1).fill(0);
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            for(let i=0; i<array.length; i++) {
                if(!isSorting) return;
                bars[i].className = 'bar bar-compare';
                await sleep(getDelay());
                count[array[i]]++;
                bars[i].className = 'bar bar-default';
            }

            let arrIdx = 0;
            for(let i=0; i<=max; i++) {
                while(count[i] > 0) {
                    if(!isSorting) return;
                    bars[arrIdx].className = 'bar bar-swap';
                    await sleep(getDelay());
                    array[arrIdx] = i;
                    updateBar(arrIdx, array[arrIdx], maxVal);
                    await sleep(getDelay());
                    bars[arrIdx].className = 'bar bar-default';
                    arrIdx++;
                    count[i]--;
                }
            }
        }

        async function radixSort() {
            const maxVal = Math.max(...array);
            const bars = document.getElementsByClassName('bar');

            async function countSortRadix(exp) {
                let output = new Array(array.length);
                let count = new Array(10).fill(0);

                for (let i = 0; i < array.length; i++) {
                    if (!isSorting) return;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());
                    count[Math.floor(array[i] / exp) % 10]++;
                    bars[i].className = 'bar bar-default';
                }

                for (let i = 1; i < 10; i++) count[i] += count[i - 1];

                for (let i = array.length - 1; i >= 0; i--) {
                    let digit = Math.floor(array[i] / exp) % 10;
                    output[count[digit] - 1] = array[i];
                    count[digit]--;
                }

                for (let i = 0; i < array.length; i++) {
                    if (!isSorting) return;
                    bars[i].className = 'bar bar-swap';
                    await sleep(getDelay());
                    array[i] = output[i];
                    updateBar(i, array[i], maxVal);
                    bars[i].className = 'bar bar-default';
                }
            }

            let max = Math.max(...array);
            for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
                if (!isSorting) break;
                await countSortRadix(exp);
            }
        }

        async function shellSort() {
            let n = array.length;
            const bars = document.getElementsByClassName('bar');
            const maxVal = Math.max(...array);

            for (let gap = Math.floor(n / 2); gap > 0; gap = Math.floor(gap / 2)) {
                for (let i = gap; i < n; i++) {
                    if (!isSorting) return;
                    let temp = array[i];
                    let j;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());

                    for (j = i; j >= gap && array[j - gap] > temp; j -= gap) {
                        bars[j - gap].className = 'bar bar-compare';
                        await sleep(getDelay());
                        
                        array[j] = array[j - gap];
                        updateBar(j, array[j], maxVal, 'bar-swap');
                        await sleep(getDelay());
                        
                        bars[j].className = 'bar bar-default';
                        bars[j - gap].className = 'bar bar-default';
                    }
                    array[j] = temp;
                    updateBar(j, array[j], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[j].className = 'bar bar-default';
                }
            }
        }

        async function timSort() {
            const RUN = 8;
            const n = array.length;
            const maxVal = Math.max(...array);
            const bars = document.getElementsByClassName('bar');

            async function insertSortTim(left, right) {
                for (let i = left + 1; i <= right; i++) {
                    let temp = array[i];
                    let j = i - 1;
                    bars[i].className = 'bar bar-compare';
                    await sleep(getDelay());
                    while (j >= left && array[j] > temp) {
                        bars[j].className = 'bar bar-compare';
                        await sleep(getDelay());
                        array[j + 1] = array[j];
                        updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                        bars[j].className = 'bar bar-default';
                        j--;
                    }
                    array[j + 1] = temp;
                    updateBar(j + 1, array[j + 1], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[j + 1].className = 'bar bar-default';
                }
            }

            async function mergeTim(l, m, r) {
                let len1 = m - l + 1, len2 = r - m;
                let left = new Array(len1), right = new Array(len2);
                for (let x = 0; x < len1; x++) left[x] = array[l + x];
                for (let x = 0; x < len2; x++) right[x] = array[m + 1 + x];

                let i = 0, j = 0, k = l;
                while (i < len1 && j < len2) {
                    if (!isSorting) return;
                    bars[k].className = 'bar bar-compare';
                    await sleep(getDelay());
                    if (left[i] <= right[j]) {
                        array[k] = left[i];
                        i++;
                    } else {
                        array[k] = right[j];
                        j++;
                    }
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++;
                }
                while (i < len1) {
                    if (!isSorting) return;
                    array[k] = left[i];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++; i++;
                }
                while (j < len2) {
                    if (!isSorting) return;
                    array[k] = right[j];
                    updateBar(k, array[k], maxVal, 'bar-swap');
                    await sleep(getDelay());
                    bars[k].className = 'bar bar-default';
                    k++; j++;
                }
            }

            for (let i = 0; i < n; i += RUN) {
                if (!isSorting) return;
                await insertSortTim(i, Math.min(i + RUN - 1, n - 1));
            }

            for (let size = RUN; size < n; size = 2 * size) {
                for (let left = 0; left < n; left += 2 * size) {
                    if (!isSorting) return;
                    let mid = left + size - 1;
                    let right = Math.min(left + 2 * size - 1, n - 1);
                    if (mid < right) await mergeTim(left, mid, right);
                }
            }
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        btnGenerate.addEventListener('click', generateArray);
        btnSetData.addEventListener('click', handleCustomInput);
        
        inputCustom.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCustomInput();
        });

        // Smart Debounce resize to prevent jank
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const newBars = getResponsiveBarCount();
                // If custom input, don't automatically regenerate unless bars mismatch and it's not custom array 
                // To keep it simple, only auto-adjust size if it was generated automatically
                if (!isSorting && !inputCustom.value) {
                    // Update layout classes (hide labels if container is too small)
                    renderArray(); 
                }
                
                // If not custom array, adjust numBars (but only if we need to regenerate)
                // Actually, the original behaviour was to just regenerate on resize.
                if (numBars !== newBars && !isSorting) {
                    numBars = newBars;
                    generateArray();
                }
            }, 150);
        });

        btnStart.addEventListener('click', async () => {
            if (isSorting) return;
            isSorting = true;
            isPaused = false;
            updateUIState();
            renderArray(); 

            try {
                const algo = selectAlgo.value;
                switch(algo) {
                    case 'bubble': await bubbleSort(); break;
                    case 'selection': await selectionSort(); break;
                    case 'insertion': await insertionSort(); break;
                    case 'merge': await mergeSort(); break;
                    case 'quick': await quickSort(); break;
                    case 'heap': await heapSort(); break;
                    case 'counting': await countingSort(); break;
                    case 'radix': await radixSort(); break;
                    case 'shell': await shellSort(); break;
                    case 'tim': await timSort(); break;
                }
                
                if (isSorting) await markAllSorted();
            } catch (error) {
                if (error.message !== "SORTING_STOPPED") console.error(error);
            } finally {
                stopSorting();
            }
        });

        btnPause.addEventListener('click', () => {
            isPaused = !isPaused;
            updateUIState();
        });

        btnStop.addEventListener('click', () => {
            stopSorting();
            renderArray(); 
        });

        // Initial setup
        window.onload = () => {
            // Add custom font for premium feel
            const fontLink = document.createElement('link');
            fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap';
            fontLink.rel = 'stylesheet';
            document.head.appendChild(fontLink);
            
            generateArray();
        };
    </script>
</body>
